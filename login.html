<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta & Page Info -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Conduit</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main>
    <!-- Navigation -->
    <nav id="main-nav" class="nav--scrolled">
      <div class="nav-inner">
        <a href="index.html" class="logo">
          <span class="logo-text"><span class="nav-c-word"><span class="nav-c-mark"></span>on<em>duit</em></span></span>
        </a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="directory.html">Directory</a></li>
          <li><a href="map.html">Map</a></li>
          <li><a href="donate.html">Donate</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="submit.html" class="nav-cta">Submit Resource</a></li>
        </ul>
        <div class="nav-auth">
          <a href="login.html" class="nav-signin-btn" id="nav-signin-btn">Sign In</a>
          <div class="nav-profile-corner" id="nav-profile-corner" style="display:none;">
            <a href="profile.html" class="nav-avatar-link">
              <img src="" alt="My Profile" class="nav-avatar-thumb" id="nav-avatar-thumb">
            </a>
            <a href="#" class="nav-logout-link" id="nav-logout">Log out</a>
          </div>
        </div>
        <button class="mobile-menu-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>

    <!-- Page Hero -->
    <section class="page-hero">
      <div class="container">
        <p class="page-hero-eyebrow"><a href="index.html">Home</a> <span>/</span> Login</p>
        <h1>Welcome Back</h1>
        <p class="hero-sub">Log in to view your profile and community match.</p>
      </div>
    </section>

    <!-- Login Form Section -->
    <section>
      <div class="container">
        <form id="login-form" class="card" style="max-width: 500px; margin: 0 auto;">
          <!-- Email Input -->
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>
          </div>

          <!-- Login Message Display -->
          <p id="login-message" style="margin-top: 0.5rem;"></p>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary">Log In</button>

          <!-- Signup Link -->
          <p style="margin-top: 1rem;">Don't have an account? <a href="signup.html">Create an account</a></p>
        </form>
      </div>
    </section>

    <!-- Footer Section -->
    <footer>
      <div class="container">
        <p>&copy; 2026 Conduit.</p>
        <p>Connecting communities, one resource at a time.</p>
      </div>
    </footer>
  </main>

  <!-- Authentication Scripts -->
  <script src="assets/js/auth.js"></script>
</body>
</html>
